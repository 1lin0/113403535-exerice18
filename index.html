<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Heading Practice</title>
<style>
    body {
        background-color: #eee;
        font-family: "Times New Roman", serif;
    }

    .container {
        width: 750px;
        margin: 60px auto;
        background-color: #ddd;
        padding: 30px;
        box-shadow: 8px 8px 15px rgba(0,0,0,0.3);
    }

/* ✅ Heading 1（重點修正） */
    h1 {
        position: relative;
        display: inline-block;
        margin-bottom: 30px;
        text-shadow: 3px 3px 0 red;
    }

/* 上面那條黑線（變長） */
    h1::before {
        content: "";
        position: absolute;
        top: -10px;
        left: 0;
        width: 120%;
        height: 5px;
        background: black;
    }

/* ✅ Heading 2 */
    h2 {
        border: 3px solid yellow;
        padding: 15px 20px;
        font-style: italic;
        margin-bottom: 50px;
    }

/* ✅ Heading 3 */
    h3 {
        text-align: right;
        text-decoration: underline;
        margin-top: 20px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>This is heading 1</h1>
    <h2>This is heading 2</h2>
    <h3>This is heading 3</h3>
</div>

</body>
</html>
